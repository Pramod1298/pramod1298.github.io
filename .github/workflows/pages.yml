name: GitHub Pages CI
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Patch
        env:
          A345A0: ${{ secrets.A345A0 }}
          B90F75: ${{ secrets.B90F75 }}
        run: |
          sudo chown -R "$(id -un):$(id -gn)" _site
          python3 -c "
          import os, pathlib, sys
          k1 = os.environ.get('A345A0', '')
          k2 = os.environ.get('B90F75', '')
          done = 0
          for idx in pathlib.Path('_site').rglob('*.html'):
              try:
                  txt = idx.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              out = txt.replace('<!-- 7280129fbd011b1c613103632b47f0f938d6b9e4b9305fe3 -->', k1) if k1 else txt
              out = out.replace('<!-- a8e87831768b6558e6 -->', k2) if k2 else out
              if out != txt:
                  idx.write_text(out, encoding='utf-8')
                  done += 1
          if done == 0 and (k1 or k2):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
